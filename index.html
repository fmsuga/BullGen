<style>
:root {
  --bg:    #080808;
  --bg2:   #111;
  --bg3:   #1a1a1a;
  --bg4:   #222;
  --line:  #1f1f1f;
  --line2: #2a2a2a;
  --line3: #333;
  --t1:    #f0f0f0;
  --t2:    #888;
  --t3:    #444;
  --acc:   #00ff87;   /* verde neón — el único color fuerte, para lo más importante */
  --acc2:  #00cc6a;
  --blue:  #4488ff;
  --red:   #ff4455;
  --amber: #ffaa00;
  --sans:  'Inter', sans-serif;
  --mono:  'Space Mono', monospace;
  --ease:  cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--sans);
  height: 100%;
  overflow: hidden;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; }
.screens { flex: 1; min-height: 0; position: relative; overflow: hidden; }
.screen { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; display: none; -webkit-overflow-scrolling: touch; }
.screen.on { display: block; }

/* ── NAV ── */
.nav {
  display: flex;
  background: var(--bg);
  border-top: 1px solid var(--line2);
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nb {
  flex: 1; padding: 10px 4px 8px;
  background: none; border: none; color: var(--t3);
  font-family: var(--sans); font-size: 9px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: color .2s var(--ease);
  position: relative;
}
.nb svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke .2s; }
.nb.on { color: var(--acc); }
.nb.on::after {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 24px; height: 2px;
  background: var(--acc);
  border-radius: 0 0 2px 2px;
  animation: slideDown .2s var(--ease);
}
@keyframes slideDown { from { opacity:0; transform: translateX(-50%) translateY(-4px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* ── PANTALLA ENTRENAR — selector días ── */
.day-pick { padding: 0 14px 100px; }
.dp-header { padding: 28px 2px 20px; }
.dp-title { font-size: 26px; font-weight: 600; letter-spacing: -.02em; color: var(--t1); margin-bottom: 5px; }
.dp-sub { font-size: 13px; color: var(--t3); font-weight: 400; }

.day-card {
  background: var(--bg2);
  border: 1px solid var(--line2);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: border-color .15s, background .15s;
  /* La animación de entrada escalonada — "future" */
  animation: fadeUp .3s var(--ease) both;
}
.day-card:nth-child(2) { animation-delay: .04s; }
.day-card:nth-child(3) { animation-delay: .08s; }
.day-card:nth-child(4) { animation-delay: .12s; }
.day-card:nth-child(5) { animation-delay: .16s; }
.day-card:nth-child(6) { animation-delay: .20s; }
@keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
.day-card:active { background: var(--bg3); border-color: var(--line3); }
.day-card.done-today { border-color: var(--acc2); }
.dc-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; letter-spacing: -.01em; }
.dc-muscle { font-size: 13px; color: var(--t2); }
.dc-count { font-size: 11px; color: var(--t3); margin-top: 5px; font-family: var(--mono); }
.dc-done { font-size: 11px; color: var(--acc); font-weight: 600; letter-spacing: .04em; }
.dc-arrow { font-size: 20px; color: var(--t3); }

/* ── PANTALLA ENTRENAR — sesión activa ── */
.train-view { display: flex; flex-direction: column; height: 100%; }

.tv-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.tv-exit {
  background: none; border: none; color: var(--t3);
  font-size: 18px; cursor: pointer; padding: 2px 4px;
  line-height: 1; flex-shrink: 0; transition: color .15s;
  font-family: var(--sans);
}
.tv-exit:hover { color: var(--red); }
.tv-day { font-size: 12px; font-weight: 500; color: var(--t2); flex: 1; letter-spacing: .01em; }
.tv-elapsed { font-family: var(--mono); font-size: 12px; color: var(--t3); }

.tv-progress-bar { height: 2px; background: var(--line2); flex-shrink: 0; }
.tv-progress-fill { height: 100%; background: var(--acc); transition: width .5s var(--ease); }

.tv-body { flex: 1; min-height: 0; overflow-y: auto; padding: 20px 14px 10px; display: flex; flex-direction: column; gap: 12px; }

/* Contador y skip */
.ex-counter-row { display: flex; align-items: center; justify-content: space-between; }
.ex-counter { font-size: 11px; color: var(--t3); font-family: var(--mono); letter-spacing: .06em; }
.ex-counter .cur-n { color: var(--acc); }
.btn-skip-ex {
  background: none; border: none; color: var(--t3);
  font-size: 13px; cursor: pointer; padding: 2px 6px;
  font-family: var(--mono); letter-spacing: .05em;
  transition: color .15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-skip-ex:hover { color: var(--t1); }

/* Bloque de ejercicio */
.current-series-block, .ss-second-block {
  background: var(--bg2);
  border: 1px solid var(--line2);
  border-radius: 16px;
  padding: 18px 18px 14px;
  animation: fadeUp .2s var(--ease);
}
.ss-second-block { border-color: rgba(68,136,255,.3); }

.csb-label { font-size: 10px; color: var(--t3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; font-weight: 500; }
.ex-name-main { font-size: 22px; font-weight: 600; letter-spacing: -.02em; line-height: 1.2; margin-bottom: 14px; word-break: break-word; }

.series-strip { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
.serie-dot {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1.5px solid var(--line3);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; color: var(--t3);
  transition: all .2s var(--ease);
}
.serie-dot.done { background: var(--acc); border-color: var(--acc); color: #000; font-weight: 700; }
.serie-dot.current { border-color: var(--acc); color: var(--acc); box-shadow: 0 0 0 3px rgba(0,255,135,.1); }

.csb-reps-obj {
  font-family: var(--mono); font-size: 56px; font-weight: 700;
  color: var(--t1); line-height: 1; letter-spacing: -.04em;
}
.csb-reps-label { font-size: 11px; color: var(--t3); margin: 4px 0 16px; letter-spacing: .06em; text-transform: uppercase; }

.prev-weight-block {
  background: var(--bg3);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;
}
.pw-label { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .07em; }
.pw-value { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--acc); line-height: 1; }
.pw-unit  { font-size: 13px; color: var(--t2); }
.pw-source { font-size: 10px; color: var(--t3); margin-left: auto; align-self: center; }

.ss-divider {
  font-size: 10px; color: var(--blue); letter-spacing: .1em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px; padding: 2px 0;
}
.ss-divider::before, .ss-divider::after { content:''; flex:1; height:1px; background:rgba(68,136,255,.2); }

.desc-toggle { font-size: 12px; color: var(--t3); background: none; border: none; cursor: pointer; padding: 6px 0; text-decoration: underline; text-decoration-style: dotted; font-family: var(--sans); }
.desc-text { font-size: 13px; color: var(--t2); line-height: 1.6; margin-top: 6px; display: none; }
.desc-text.open { display: block; }

/* Footer */
.tv-footer {
  padding: 10px 14px calc(12px + env(safe-area-inset-bottom, 0px));
  display: flex; gap: 8px;
  flex-shrink: 0;
  border-top: 1px solid var(--line);
  background: var(--bg);
}
.btn-rest {
  padding: 13px 16px;
  background: var(--bg2); color: var(--t2);
  border: 1px solid var(--line2); border-radius: 12px;
  font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background .15s;
}
.btn-rest:active { background: var(--bg3); }
.btn-series-done {
  flex: 1; padding: 13px;
  background: var(--bg2); color: var(--acc);
  border: 1px solid rgba(0,255,135,.25); border-radius: 12px;
  font-family: var(--sans); font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: .01em;
  transition: background .15s, border-color .15s;
}
.btn-series-done:active { background: var(--bg3); }
.btn-series-done.last {
  background: var(--acc); color: #000;
  border-color: var(--acc);
}

/* Sesión completa */
.sc-wrap { padding: 48px 20px; text-align: center; }
.sc-icon { font-size: 48px; margin-bottom: 16px; }
.sc-title { font-size: 26px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 6px; }
.sc-sub { font-size: 13px; color: var(--t2); margin-bottom: 24px; }
.sc-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 24px; }
.scs { background: var(--bg2); border: 1px solid var(--line2); border-radius: 12px; padding: 14px 6px; }
.scs-v { font-family: var(--mono); font-size: 24px; font-weight: 700; color: var(--acc); }
.scs-l { font-size: 10px; color: var(--t3); margin-top: 4px; text-transform: uppercase; letter-spacing: .07em; }
.btn-back { width: 100%; padding: 16px; background: var(--acc); color: #000; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: var(--sans); }

/* ── BOTTOM SHEET ── */
.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s; }
.sheet-overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 430px;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--line3);
  padding: 18px 18px calc(18px + env(safe-area-inset-bottom, 0px));
  z-index: 101;
  transition: transform .28s var(--ease);
}
.sheet.open { transform: translateX(-50%) translateY(0); }
.sheet-handle { width: 32px; height: 3px; background: var(--line3); border-radius: 2px; margin: 0 auto 18px; }
.sheet-win-title { display: none; }
.sheet-row { display: flex; gap: 10px; margin-bottom: 12px; }
.sheet-field { flex: 1; }
.sf-label { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; display: block; font-weight: 500; }
.sf-input {
  width: 100%;
  background: var(--bg3); border: 1px solid var(--line2);
  border-radius: 10px; color: var(--t1);
  font-family: var(--mono); font-size: 24px; font-weight: 700;
  text-align: center; padding: 10px 6px;
  transition: border-color .15s; -webkit-appearance: none;
}
.sf-input:focus { outline: none; border-color: var(--acc); }
.sf-check { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; }
.sf-check-box {
  width: 20px; height: 20px; border-radius: 5px;
  border: 1.5px solid var(--line3); background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.sf-check-box.on { background: var(--red); border-color: var(--red); }
.sf-check-box svg { width: 11px; height: 11px; stroke: #fff; fill: none; stroke-width: 3; stroke-linecap: round; display: none; }
.sf-check-box.on svg { display: block; }
.sf-check-label { font-size: 14px; color: var(--t2); }
.sf-rpe-row { display: flex; gap: 4px; flex-wrap: wrap; }
.rpe-btn {
  flex: 1; min-width: 24px; padding: 8px 2px;
  background: var(--bg3); border: 1px solid var(--line2);
  border-radius: 8px; color: var(--t2);
  font-family: var(--mono); font-size: 12px; cursor: pointer;
  transition: all .12s; text-align: center;
}
.rpe-btn.sel { background: var(--acc); border-color: var(--acc); color: #000; font-weight: 700; }
.sheet-note {
  width: 100%; background: var(--bg3); border: 1px solid var(--line2);
  border-radius: 10px; color: var(--t2);
  font-family: var(--sans); font-size: 14px;
  padding: 10px 12px; resize: none; height: 42px;
  transition: height .2s, border-color .15s; margin-bottom: 12px;
}
.sheet-note:focus { outline: none; border-color: var(--acc); height: 66px; }
.btn-confirm {
  width: 100%; padding: 15px;
  background: var(--acc); color: #000;
  border: none; border-radius: 12px;
  font-family: var(--sans); font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity .1s;
}
.btn-confirm:active { opacity: .85; }

/* ── TIMER ── */
.timer-pill {
  position: fixed;
  top: env(safe-area-inset-top, 0px);
  left: 50%; transform: translateX(-50%) translateY(-70px);
  width: calc(min(400px, 100vw) - 24px);
  background: var(--bg3);
  border: 1px solid var(--line3);
  border-radius: 50px;
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  z-index: 90;
  transition: transform .28s var(--ease);
}
.timer-pill.show { transform: translateX(-50%) translateY(10px); }
.timer-num { font-family: var(--mono); font-size: 24px; font-weight: 700; min-width: 60px; transition: color .3s; }
.tc-ok { color: var(--acc); }
.tc-warn { color: var(--amber); }
.tc-end { color: var(--red); }
.timer-lbl { font-size: 11px; color: var(--t2); flex: 1; }
.t-add { padding: 5px 11px; background: var(--bg4); border: 1px solid var(--line3); border-radius: 20px; color: var(--t2); font-size: 11px; cursor: pointer; font-family: var(--sans); font-weight: 500; }
.t-skip { padding: 5px 8px; background: none; border: none; color: var(--t3); font-size: 11px; cursor: pointer; font-family: var(--sans); }

/* ── PROGRESO ── */
.prog-wrap { padding: 0 0 100px; }
.prog-header { padding: 24px 16px 14px; border-bottom: 1px solid var(--line); }
.ph-title { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
.ph-sub { font-size: 12px; color: var(--t3); margin-top: 4px; }

/* Racha */
.streak-bar {
  margin: 14px 14px 0;
  background: var(--bg2); border: 1px solid var(--line2);
  border-radius: 14px; padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
}
.streak-num { font-family: var(--mono); font-size: 44px; font-weight: 700; color: var(--acc); line-height: 1; }
.streak-label { font-size: 12px; font-weight: 600; color: var(--t2); margin-bottom: 3px; }
.streak-sub { font-size: 11px; color: var(--t3); }

/* Heatmap */
.heatmap-wrap { padding: 14px 14px 0; }
.hm-label { font-size: 10px; color: var(--t3); margin-bottom: 8px; letter-spacing: .06em; text-transform: uppercase; font-weight: 500; }
.heatmap-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
.hm-cell {
  aspect-ratio: 1;
  background: var(--bg3);
  border-radius: 2px;
  transition: background .15s;
}
.hm-cell.lvl1 { background: #052e16; }
.hm-cell.lvl2 { background: #14532d; }
.hm-cell.lvl3 { background: #15803d; }
.hm-cell.lvl4 { background: var(--acc); }
.hm-cell.today { outline: 1.5px solid var(--amber); outline-offset: 1px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 14px; }
.stat-c { background: var(--bg2); border: 1px solid var(--line); border-radius: 12px; padding: 14px 14px 12px; }
.stat-v { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--acc); }
.stat-l { font-size: 10px; color: var(--t3); margin-top: 4px; text-transform: uppercase; letter-spacing: .07em; }

.sec-label { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .1em; padding: 12px 16px 6px; }
.ex-sel-wrap { padding: 0 14px 8px; }
.ex-sel {
  width: 100%; background: var(--bg2); border: 1px solid var(--line2);
  border-radius: 10px; color: var(--t1);
  font-family: var(--sans); font-size: 14px; padding: 10px 12px;
  appearance: none;
}
.chart-wrap { height: 190px; padding: 0 14px 14px; position: relative; }
.sess-list { padding: 0 12px; }
.sess-c { background: var(--bg2); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 7px; }
.sess-date { font-family: var(--mono); font-size: 10px; color: var(--t3); margin-bottom: 6px; }
.sess-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
.sess-inf { font-size: 13px; color: var(--t2); }
.sess-inf b { color: var(--t1); font-weight: 600; }
.pr-badge { font-size: 9px; font-weight: 700; background: rgba(0,255,135,.1); color: var(--acc); padding: 2px 7px; border-radius: 6px; margin-left: 4px; letter-spacing: .05em; }

/* ── RUTINAS ── */
.rout-wrap { padding: 0 0 100px; }
.rout-header { padding: 24px 16px 14px; border-bottom: 1px solid var(--line); }
.rh-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.rh-name { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
.rh-date { font-size: 11px; color: var(--t3); margin-top: 3px; font-family: var(--mono); }
.rh-days-count { font-size: 12px; color: var(--t2); margin-top: 2px; }
.btn-new-rout { padding: 9px 16px; background: var(--bg2); color: var(--acc); border: 1px solid rgba(0,255,135,.25); border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sans); white-space: nowrap; transition: background .15s; }
.btn-new-rout:active { background: var(--bg3); }
.rout-3m-bar { display: flex; align-items: center; gap: 10px; }
.r3m-label { font-size: 10px; color: var(--t3); white-space: nowrap; font-weight: 500; }
.r3m-track { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.r3m-fill { height: 100%; background: var(--acc); border-radius: 2px; transition: width .6s var(--ease); }
.r3m-pct { font-family: var(--mono); font-size: 12px; color: var(--acc); white-space: nowrap; }
.btn-data {

<script>
/* =====================================================
   BASE DE DATOS LOCAL
   Todo vive en localStorage como JSON.
   La función ldb() (load db) intenta parsear; si falla
   o no existe, devuelve la estructura por defecto.
   sdb() (save db) serializa a JSON y guarda.
   
   PATRÓN IMPORTANTE: los datos de rutina (qué ejercicios hay)
   y los datos de sesión (qué pesos se usaron) son estructuras
   SEPARADAS. Esto es clave: si editás la rutina, el historial
   no se corrompe. Cada sesión guarda una snapshot de lo que pasó.
===================================================== */
const KEY = 'bullgen_v1';

// ── CONFIGURACIÓN API ──
// Una vez que deployaste el backend en Vercel, reemplazá estos dos valores.
// Mientras tanto la app funciona 100% con localStorage (modo offline).
const API_URL = '';         // ej: 'https://bullgen-api-xyz.vercel.app'
const API_KEY = '';         // el mismo string que pusiste en .env del backend

const API_HEADERS = {
  'Content-Type': 'application/json',
  'x-api-key': API_KEY
};

function ldb() {
  try { return JSON.parse(localStorage.getItem(KEY)) || defaultDB(); }
  catch(e) { return defaultDB(); }
}
function sdb() { localStorage.setItem(KEY, JSON.stringify(db)); }

// syncFromServer: al arrancar la app, intenta traer los datos del servidor.
// Si no hay conexión o la API_URL está vacía, usa el localStorage como fallback.
// Esto permite usar la app sin internet (en el gym sin señal) sin que rompa nada.
async function syncFromServer() {
  if (!API_URL) return; // modo offline: API no configurada todavía
  try {
    const res  = await fetch(API_URL + '/api/sync', { headers: API_HEADERS });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.routines?.length) db.routines = data.routines;
    if (data.sessions?.length) db.sessions = data.sessions;
    sdb(); // actualiza cache local con los datos del servidor
  } catch (e) {
    console.warn('Sin conexión con el servidor, usando cache local:', e.message);
  }
}

// syncRoutines: guarda rutinas en el servidor en background.
// fire-and-forget: no bloquea la UI, los errores se ignoran silenciosamente.
function syncRoutines() {
  if (!API_URL) return;
  fetch(API_URL + '/api/routines', {
    method: 'POST',
    headers: API_HEADERS,
    body: JSON.stringify({ routines: db.routines })
  }).catch(() => {});
}

// syncSession: manda una sesión al servidor al terminar de entrenar.
function syncSession(session) {
  if (!API_URL) return;
  fetch(API_URL + '/api/sessions', {
    method: 'POST',
    headers: API_HEADERS,
    body: JSON.stringify(session)
  }).catch(() => {});
}

function defaultDB() {
  return {
    routines: [{
      id: 'r1', name: 'Rutina actual', active: true,
      days: [
        { id: 'd1', name: 'Lunes', muscle: 'Pecho + Tríceps', exercises: [
          { id:'e1', name:'Press banca plano',      sets:4, reps:'10/8/6/5', sw:80,  ss:null,  desc:'Agarre ligeramente más ancho que hombros. Bajar controlado hasta el pecho.' },
          { id:'e2', name:'Press inclinado mancuernas', sets:3, reps:'10/10/8', sw:28, ss:null, desc:'' },
          { id:'e3', name:'Aperturas mancuernas',   sets:3, reps:'12',       sw:16,  ss:'e4',  desc:'Codos ligeramente flexionados. Bajar hasta sentir estiramiento.' },
          { id:'e4', name:'Fondos en paralelas',    sets:3, reps:'12',       sw:0,   ss:'e3',  desc:'Peso corporal o con lastre. Inclinar torso al frente para pecho.' },
          { id:'e5', name:'Extensión tríceps polea',sets:3, reps:'12/12/10', sw:30,  ss:null,  desc:'' },
        ]},
        { id: 'd2', name: 'Martes', muscle: 'Espalda + Bíceps', exercises: [
          { id:'e6', name:'Dominadas',             sets:4, reps:'8/6/6/5',  sw:0,   ss:null,  desc:'Peso corporal. Agarre prono, ancho.' },
          { id:'e7', name:'Remo con barra',        sets:4, reps:'8/8/6/6',  sw:70,  ss:null,  desc:'' },
          { id:'e8', name:'Curl barra',            sets:3, reps:'10/10/8',  sw:30,  ss:'e9',  desc:'' },
          { id:'e9', name:'Curl martillo',         sets:3, reps:'12',       sw:14,  ss:'e8',  desc:'' },
        ]},
        { id: 'd3', name: 'Miércoles', muscle: 'Pierna', exercises: [
          { id:'e10', name:'Sentadilla',            sets:5, reps:'10/8/6/5/5', sw:100, ss:null, desc:'Espalda neutra, rodillas sobre puntas de pies.' },
          { id:'e11', name:'Prensa',                sets:3, reps:'12/10/8',   sw:140, ss:null, desc:'' },
          { id:'e12', name:'Extensión cuádriceps',  sets:3, reps:'15',        sw:50,  ss:'e13', desc:'' },
          { id:'e13', name:'Curl femoral',          sets:3, reps:'15',        sw:40,  ss:'e12', desc:'' },
          { id:'e14', name:'Pantorrillas sentado',  sets:4, reps:'15',        sw:60,  ss:null, desc:'' },
        ]},
        { id: 'd4', name: 'Jueves', muscle: 'Hombros', exercises: [
          { id:'e15', name:'Press militar',         sets:4, reps:'10/8/6/6', sw:50,  ss:null, desc:'' },
          { id:'e16', name:'Elevaciones laterales', sets:4, reps:'15',       sw:10,  ss:null, desc:'' },
          { id:'e17', name:'Pájaro mancuernas',     sets:3, reps:'12',       sw:12,  ss:null, desc:'' },
        ]},
        { id: 'd5', name: 'Viernes', muscle: 'Core + Cardio', exercises: [
          { id:'e18', name:'Plancha',               sets:4, reps:'60s',      sw:0,   ss:null, desc:'' },
          { id:'e19', name:'Abdominales',           sets:4, reps:'20',       sw:0,   ss:null, desc:'' },
        ]},
      ]
    }],
    sessions: [],
    cur: null   // sesión en curso
  };
}

let db = ldb();

/* =====================================================
   ESTADO DE LA UI
   Variables globales de estado de la app.
   En frameworks como React esto viviría en useState/store.
   En vanilla JS lo manejamos explícitamente.
===================================================== */
let openDays  = {};           // qué días están expandidos en Rutinas
let progChart = null;         // instancia de Chart.js (la guardamos para destruirla antes de recrear)
let timerSecs = 0;
let timerIv   = null;
let elapsedIv = null;
let sessStart = null;

// Estado del flujo de entrenamiento
let trainState = {
  exerciseQueue: [],   // lista de ejercicios del día (expandida: superseries juntas)
  currentExIdx:  0,    // índice del ejercicio actual
  currentSerieIdx: 0,  // serie actual dentro del ejercicio
  dayId: null,
};

// =====================================================
// NAVEGACIÓN
// =====================================================
function go(s) {
  ['train','prog','rout'].forEach(n => {
    document.getElementById('s-'+n).classList.toggle('on', n===s);
    document.getElementById('nb-'+n).classList.toggle('on', n===s);
  });
  if (s==='train') renderTrain();
  if (s==='prog')  renderProg();
  if (s==='rout')  renderRout();
}

// =====================================================
// PANTALLA PRINCIPAL: ENTRENAR
// =====================================================
function renderTrain() {
  const el  = document.getElementById('s-train');
  const rout = db.routines.find(r => r.active);
  if (!rout) { el.innerHTML = '<div class="empty-state">Creá una rutina en la sección Rutinas</div>'; return; }

  // Si hay sesión activa, renderizamos el flujo de entrenamiento
  if (db.cur) {
    renderTrainActive(el, rout);
    return;
  }

  // Sin sesión: selector de días
  let h = '<div class="day-pick"><div class="dp-header"><div class="dp-title">¿Qué entrenamos?</div>';
  h += `<div class="dp-sub">${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div></div>`;
  rout.days.forEach(day => {
    const doneToday = db.sessions.some(s => s.dayId===day.id && isToday(s.date));
    h += `<div class="day-card ${doneToday?'done-today':''}" onclick="startSession('${rout.id}','${day.id}')">
      <div class="dc-left">
        <div class="dc-name">${day.name}</div>
        <div class="dc-muscle">${day.muscle}</div>
        <div class="dc-count">${day.exercises.length} ejercicios</div>
      </div>
      <div>
        ${doneToday ? '<div class="dc-done">✓ HECHO</div>' : '<div class="dc-arrow">›</div>'}
      </div>
    </div>`;
  });
  h += '</div>';
  el.innerHTML = h;
}

function renderTrainActive(el, rout) {
  const day  = rout.days.find(d => d.id === db.cur.dayId);
  const sess = db.cur;

  /* buildQueue: construye la lista de "bloques" a entrenar.
     Un bloque puede ser un ejercicio solo, o una superserie (2 juntos).
     Una superserie se detecta cuando ex.ss apunta al id del compañero.
     Evitamos duplicar: usamos un Set de ids ya procesados. */
  if (!trainState.dayId || trainState.dayId !== db.cur.dayId) {
    buildQueue(day);
  }

  const totalSeries = trainState.exerciseQueue.reduce((a, blk) => {
    return a + blk.reduce((b, ex) => b + ex.sets, 0);
  }, 0);
  const doneSeries = countDoneSeries(sess);
  const pct = totalSeries > 0 ? Math.round(doneSeries / totalSeries * 100) : 0;

  const curBlk = trainState.exerciseQueue[trainState.currentExIdx];
  if (!curBlk) { showSessionComplete(sess, day); return; }

  let h = `<div class="train-view">
    <div class="tv-header">
      <button class="tv-exit" onclick="confirmExit()">✕</button>
      <div class="tv-day">${day.name} · ${day.muscle}</div>
      <div class="tv-elapsed" id="elapsed">00:00</div>
    </div>
    <div class="tv-progress-bar"><div class="tv-progress-fill" style="width:${pct}%"></div></div>
    <div class="tv-body">`;

  const blkTotal = trainState.exerciseQueue.length;
  h += `<div class="ex-counter-row">
    <div class="ex-counter">Ejercicio <span class="cur-n">${trainState.currentExIdx + 1}</span> de ${blkTotal}</div>
    <button class="btn-skip-ex" onclick="skipExercise()" title="Saltear ejercicio">&#8594;</button>
  </div>`;

  // Renderizamos cada ejercicio del bloque (1 o 2 en superserie)
  curBlk.forEach((ex, bi) => {
    const isSecond = bi > 0;
    const curSerie = trainState.currentSerieIdx;
    const rA = ex.reps.toString().split('/');
    const prevW = getPrevWeight(ex.id);
    const blockClass = isSecond ? 'ss-second-block' : 'current-series-block';

    if (isSecond) {
      h += `<div class="ss-divider">superserie</div>`;
    }

    h += `<div class="${blockClass}">
      <div class="csb-label">Serie ${curSerie + 1} de ${ex.sets}</div>
      <div class="ex-name-main">${ex.name}</div>`;

    // Puntos de series
    h += `<div class="series-strip">`;
    for (let s = 0; s < ex.sets; s++) {
      const isDone = s < curSerie;
      const isCur  = s === curSerie;
      h += `<div class="serie-dot ${isDone?'done':''} ${isCur?'current':''}">${s+1}</div>`;
    }
    h += `</div>`;

    // Reps objetivo
    const repsObj = rA[curSerie] || rA[rA.length-1];
    h += `<div class="csb-reps-obj">${repsObj}</div>
      <div class="csb-reps-label">repeticiones</div>
      <div class="prev-weight-block">
        <span class="pw-label">Peso</span>
        <span class="pw-value">${prevW.val}</span>
        <span class="pw-unit">kg</span>
        <span class="pw-source">${prevW.src}</span>
      </div>`;

    if (ex.desc) {
      h += `<button class="desc-toggle" onclick="toggleDesc('desc-${bi}')">ver técnica</button>
        <div class="desc-text" id="desc-${bi}">${ex.desc}</div>`;
    }
    h += `</div>`; // close block
  });

  h += `</div>`; // tv-body

  const isLast = trainState.currentExIdx >= trainState.exerciseQueue.length - 1 && trainState.currentSerieIdx >= curBlk[0].sets - 1;
  h += `<div class="tv-footer">
    <button class="btn-rest" onclick="startTimer(120)">⏱ Descanso</button>
    <button class="btn-series-done ${isLast?'last':''}" onclick="openSerieSheet()">
      ${isLast ? 'Terminar sesión ✓' : 'Serie hecha →'}
    </button>
  </div></div>`;

  el.innerHTML = h;
  if (!sessStart) sessStart = db.cur.t0;
  startElapsed();
}

function buildQueue(day) {
  const exs = day.exercises;
  const seen = new Set();
  const queue = [];
  exs.forEach(ex => {
    if (seen.has(ex.id)) return;
    seen.add(ex.id);
    const pair = ex.ss ? exs.find(e => e.id === ex.ss) : null;
    if (pair) {
      seen.add(pair.id);
      queue.push([ex, pair]); // bloque de 2
    } else {
      queue.push([ex]);       // bloque de 1
    }
  });
  trainState.exerciseQueue = queue;
  trainState.currentExIdx  = 0;
  trainState.currentSerieIdx = 0;
  trainState.dayId = day.id;
}

// normName: clave del sistema cross-rutina.
// Normaliza nombres para comparar: "Press Banca Plano" == "press banca plano"
function normName(n) { return (n||'').toLowerCase().trim().replace(/\s+/g,' '); }

// resolveExName: dado un exId busca su nombre en TODAS las rutinas (activas y viejas).
// Necesario porque las sesiones viejas tienen IDs de rutinas viejas.
function resolveExName(exId) {
  for (const r of db.routines)
    for (const d of r.days) {
      const ex = d.exercises.find(e => e.id===exId);
      if (ex) return normName(ex.name);
    }
  return null;
}

// getPrevWeight: busca historial por NOMBRE normalizado, no por ID.
// Asi "Sentadilla" en la rutina nueva encuentra el historial de la rutina vieja.
// Los IDs son efimeros, el nombre es la identidad real del ejercicio.
function getPrevWeight(exId) {
  const targetName = resolveExName(exId);
  for (const sess of db.sessions) {
    for (const [sessExId, ed] of Object.entries(sess.ed||{})) {
      if (!ed||typeof ed!=='object') continue;
      if (resolveExName(sessExId) !== targetName) continue;
      let maxW = 0;
      Object.entries(ed).forEach(([k,v]) => {
        if (k==='note'||!v||typeof v!=='object') return;
        const w = parseFloat(v.w)||0;
        if (w>maxW) maxW=w;
      });
      if (maxW>0) return { val:maxW, src:'última vez' };
    }
  }
  const rout = db.routines.find(r=>r.active);
  const ex = rout?.days.flatMap(d=>d.exercises).find(e=>e.id===exId);
  return { val: ex?.sw||0, src:'sugerido' };
}

function countDoneSeries(sess) {
  if (!sess?.ed) return 0;
  let n = 0;
  Object.values(sess.ed).forEach(ex => {
    Object.entries(ex || {}).forEach(([k, v]) => {
      if (k !== 'note' && v && typeof v === 'object') n++;
    });
  });
  return n;
}

function toggleDesc(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

// =====================================================
// BOTTOM SHEET: registrar serie
// =====================================================
let sheetData = {}; // datos temporales del sheet

function openSerieSheet() {
  const curBlk = trainState.exerciseQueue[trainState.currentExIdx];
  if (!curBlk) return;
  const ex = curBlk[0]; // serie principal
  const rA = ex.reps.toString().split('/');
  const repsObj = rA[trainState.currentSerieIdx] || rA[rA.length-1];
  const prevW = getPrevWeight(ex.id);

  sheetData = { w: prevW.val, ra: '', fallo: false, rpe: null, note: '' };

  let h = `<div class="sheet-title">Serie ${trainState.currentSerieIdx + 1} · ${ex.name}</div>`;

  h += `<div class="sheet-row">
    <div class="sheet-field">
      <span class="sf-label">Peso usado (kg)</span>
      <input type="number" class="sf-input" id="sh-w" value="${prevW.val}" min="0" step="2.5"
        oninput="sheetData.w=parseFloat(this.value)||0">
    </div>
    <div class="sheet-field">
      <span class="sf-label">Reps reales</span>
      <input type="number" class="sf-input" id="sh-ra" placeholder="${repsObj}" min="0" step="1"
        oninput="sheetData.ra=parseInt(this.value)||''">
    </div>
  </div>`;

  h += `<div class="sheet-row">
    <div class="sheet-field">
      <span class="sf-label">Fue al fallo</span>
      <div class="sf-check" onclick="toggleFallo()">
        <div class="sf-check-box" id="fallo-box">
          <svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg>
        </div>
        <span class="sf-check-label">Marcar fallo (F)</span>
      </div>
    </div>
  </div>`;

  h += `<div class="sheet-field" style="margin-bottom:14px">
    <span class="sf-label">RPE (esfuerzo percibido 1–10)</span>
    <div class="sf-rpe-row">`;
  for (let i=1; i<=10; i++) {
    h += `<button class="rpe-btn" id="rpe-${i}" onclick="setRPE(${i})">${i}</button>`;
  }
  h += `</div></div>`;

  h += `<textarea class="sheet-note" id="sh-note" placeholder="Nota opcional sobre esta serie…"
    oninput="sheetData.note=this.value"></textarea>`;

  const isLast = trainState.currentExIdx >= trainState.exerciseQueue.length - 1
              && trainState.currentSerieIdx >= curBlk[0].sets - 1;
  h += `<button class="btn-confirm" onclick="confirmSerie()">${isLast ? 'Finalizar sesión ✓' : 'Confirmar serie →'}</button>`;

  document.getElementById('sheet-inner').innerHTML = h;
  document.getElementById('sheet-ov').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  // Focus automático en el input de peso para agilizar la carga
  setTimeout(() => document.getElementById('sh-w')?.select(), 350);
}

function toggleFallo() {
  sheetData.fallo = !sheetData.fallo;
  document.getElementById('fallo-box')?.classList.toggle('on', sheetData.fallo);
}

function setRPE(n) {
  sheetData.rpe = sheetData.rpe === n ? null : n;
  document.querySelectorAll('.rpe-btn').forEach(b => b.classList.remove('sel'));
  if (sheetData.rpe) document.getElementById('rpe-'+n)?.classList.add('sel');
}

function closeSheet() {
  document.getElementById('sheet-ov').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function confirmSerie() {
  /* Guardamos los datos de esta serie en db.cur.ed
     Estructura: db.cur.ed[exId][serieIdx] = { w, ra, fallo, rpe, note } */
  if (!db.cur) return;
  const curBlk = trainState.exerciseQueue[trainState.currentExIdx];
  const si = trainState.currentSerieIdx;
  const rA = curBlk[0].reps.toString().split('/');

  curBlk.forEach(ex => {
    if (!db.cur.ed[ex.id]) db.cur.ed[ex.id] = {};
    db.cur.ed[ex.id][si] = {
      w:     sheetData.w,
      ra:    sheetData.ra || (rA[si] || rA[rA.length-1]),
      fallo: sheetData.fallo,
      rpe:   sheetData.rpe,
    };
    if (sheetData.note) db.cur.ed[ex.id].note = sheetData.note;
  });

  // Avanzar: primero intentamos siguiente serie, luego siguiente ejercicio
  const maxSeries = curBlk[0].sets;
  if (si + 1 < maxSeries) {
    trainState.currentSerieIdx++;
    startTimer(120);
  } else {
    // Marca el bloque como completado
    curBlk.forEach(ex => {
      if (!db.cur.done) db.cur.done = [];
      if (!db.cur.done.includes(ex.id)) db.cur.done.push(ex.id);
    });
    trainState.currentExIdx++;
    trainState.currentSerieIdx = 0;
    if (trainState.currentExIdx < trainState.exerciseQueue.length) {
      startTimer(120);
    }
  }

  sdb();
  closeSheet();
  renderTrain();
}

function startSession(routId, dayId) {
  sessStart = Date.now();
  db.cur = { routId, dayId, t0: sessStart, done: [], ed: {} };
  trainState.dayId = null; // fuerza rebuild de la queue
  sdb();
  renderTrain();
}

function showSessionComplete(sess, day) {
  clearInterval(elapsedIv);
  const dur = Math.round((Date.now() - sess.t0) / 60000);
  const vol = calcVol(sess.ed);
  const saved = { id:'s'+Date.now(), dayId:sess.dayId, date:new Date().toISOString(),
    dur, h0:new Date(sess.t0).getHours(), ed:sess.ed, done:sess.done||[], vol };
  db.sessions.unshift(saved);
  db.cur = null;
  sessStart = null;
  skipTimer();
  sdb();
  syncSession(saved); // envía al servidor en background

  document.getElementById('s-train').innerHTML = `<div class="sc-wrap">
    <div class="sc-icon">🏆</div>
    <div class="sc-title">¡Sesión completa!</div>
    <div class="sc-sub">${day?.name} · ${day?.muscle}</div>
    <div class="sc-stats">
      <div class="scs"><div class="scs-v">${dur}</div><div class="scs-l">minutos</div></div>
      <div class="scs"><div class="scs-v">${saved.done.length}</div><div class="scs-l">ejercicios</div></div>
      <div class="scs"><div class="scs-v">${(vol/1000).toFixed(1)}t</div><div class="scs-l">volumen</div></div>
    </div>
    <button class="btn-back" onclick="trainState.dayId=null;renderTrain()">Volver al inicio</button>
  </div>`;
}

function calcVol(ed) {
  let t = 0;
  Object.values(ed||{}).forEach(ex => {
    Object.entries(ex||{}).forEach(([k,v]) => {
      if (k==='note'||!v||typeof v!=='object') return;
      t += (parseFloat(v.w)||0) * (parseInt(v.ra)||0);
    });
  });
  return Math.round(t);
}

function startElapsed() {
  clearInterval(elapsedIv);
  elapsedIv = setInterval(() => {
    const el = document.getElementById('elapsed');
    if (!el || !sessStart) return;
    const s = Math.floor((Date.now() - sessStart) / 1000);
    el.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 1000);
}

function startTimer(secs) {
  if (timerIv) clearInterval(timerIv);
  timerSecs = secs;
  document.getElementById('timer-pill').classList.add('show');
  updTimer();
  timerIv = setInterval(() => {
    timerSecs--;
    if (timerSecs <= 0) { skipTimer(); return; }
    updTimer();
  }, 1000);
}
function updTimer() {
  const el = document.getElementById('timer-num');
  if (!el) return;
  const m = Math.floor(timerSecs/60), s = timerSecs%60;
  el.textContent = `${m}:${String(s).padStart(2,'0')}`;
  el.className = 'timer-num ' + (timerSecs > 60 ? 'tc-ok' : timerSecs > 20 ? 'tc-warn' : 'tc-end');
}
function addTime(s) { timerSecs += s; updTimer(); }
function skipTimer() { clearInterval(timerIv); document.getElementById('timer-pill').classList.remove('show'); }

// calcWeeklyVol: agrupa sesiones por semana ISO
function calcWeeklyVol(sessions, nWeeks) {
  const weeks = [];
  const now = new Date();
  for (let i = nWeeks-1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i*7);
    const monday = new Date(d);
    monday.setDate(d.getDate() - ((d.getDay()+6)%7));
    monday.setHours(0,0,0,0);
    const sunday = new Date(monday); sunday.setDate(monday.getDate()+6); sunday.setHours(23,59,59,999);
    const vol = sessions.filter(s => {
      const sd = new Date(s.date);
      return sd >= monday && sd <= sunday;
    }).reduce((a,s)=>a+s.vol,0);
    weeks.push({ label: `${monday.getDate()}/${monday.getMonth()+1}`, vol: Math.round(vol) });
  }
  return weeks;
}

// calcMuscleFreq: cuántas veces se entrenó cada músculo en los últimos N días
function calcMuscleFreq(sessions, rout, days) {
  if (!rout) return [];
  const since = new Date(); since.setDate(since.getDate()-days);
  const recent = sessions.filter(s => new Date(s.date) >= since);
  const muscles = {};
  recent.forEach(s => {
    const day = rout.days.find(d => d.id===s.dayId);
    if (!day?.muscle) return;
    // Un día puede tener varios músculos separados por +
    day.muscle.split(/[+\/,]/).map(m => m.trim()).forEach(m => {
      if (m) muscles[m] = (muscles[m]||0) + 1;
    });
  });
  const maxFreq = Math.max(...Object.values(muscles), 1);
  // Para hipertrofia óptima: 2 veces por semana = 8 en 4 semanas
  return Object.entries(muscles)
    .sort((a,b)=>b[1]-a[1])
    .map(([name, count]) => ({ name, sessions:count, pct: Math.round(count/8*100) }));
}

// exHistory y getBest usan normName para buscar cross-rutina igual que getPrevWeight
function exHistory(exId) {
  const targetName = resolveExName(exId);
  const res = [];
  db.sessions.slice().reverse().forEach(s => {
    let wmax=0, vol=0, best1rm=0, found=false;
    for (const [sid, ed] of Object.entries(s.ed||{})) {
      if (!ed||typeof ed!=='object') continue;
      if (resolveExName(sid) !== targetName) continue;
      found = true;
      Object.entries(ed).forEach(([k,v]) => {
        if (k==='note'||!v||typeof v!=='object') return;
        const w=parseFloat(v.w)||0, r=parseInt(v.ra)||0;
        if(w>wmax) wmax=w;
        vol+=w*r;
        // 1RM estimado con fórmula Epley
        const rm = epley1RM(w, r);
        if (rm > best1rm) best1rm = rm;
      });
    }
    if (found) res.push({ date:s.date, wmax, vol:Math.round(vol), est1rm:best1rm });
  });
  return res;
}

function isPR(sess) {
  const prev = db.sessions.filter(s => s.id!==sess.id && new Date(s.date)<new Date(sess.date));
  if (!prev.length) return false;
  return sess.vol > Math.max(...prev.map(s=>s.vol), 0);
}

function avgRPE(ed) {
  let sum=0, n=0;
  Object.values(ed||{}).forEach(ex =>
    Object.entries(ex||{}).forEach(([k,v]) => { if(k!=='note'&&v&&v.rpe){sum+=v.rpe;n++;} })
  );
  return n ? Math.round(sum/n*10)/10 : null;
}

    const total = 90;
    daysElapsed = Math.min(Math.floor((Date.now() - start) / 86400000), total);
    daysLeft = Math.max(total - daysElapsed, 0);
    pct3m = Math.round(daysElapsed / total * 100);
  }

  let h = `<div class="rout-wrap">
    <div class="rout-header">
      <div class="rh-top">
        <div>
          <div class="rh-name">${rout?.name || 'Sin rutina activa'}</div>
          ${rout?.startDate ? `<div class="rh-date">desde ${fdate(rout.startDate)} · ${daysLeft > 0 ? daysLeft + ' días restantes' : 'ciclo completado'}</div>` : ''}
          ${rout ? `<div class="rh-days-count">${rout.days.length} días · ${rout.days.reduce((a,d)=>a+d.exercises.length,0)} ejercicios</div>` : ''}
        </div>
        <button class="btn-new-rout" onclick="showNewRoutineModal()">Nueva rutina</button>
      </div>

      ${rout?.startDate ? `
      <div class="rout-3m-bar">
        <span class="r3m-label">Ciclo 3 meses</span>
        <div class="r3m-track"><div class="r3m-fill" style="width:${pct3m}%"></div></div>
        <span class="r3m-pct">${pct3m}%</span>
      </div>` : ''}
    </div>`;

  if (!rout) {
    h += '<div class="empty-state">Creá tu primera rutina con el botón de arriba</div>';
  } else {
    // Vista de solo lectura: los días con sus ejercicios listados
    rout.days.forEach(day => {
      const isOpen = openDays[day.id] !== false;
      const dayLabel = day.name + (day.muscle ? ' · ' + day.muscle : '');
      h += `<div class="day-block">
        <div class="day-blk-head">
          ${editZoneOpen
            ? `<input class="day-name-input" value="${dayLabel}"
                onchange="saveDayName('${day.id}', this.value)"
                onclick="event.stopPropagation()">`
            : `<div class="dbh-name" onclick="togDay('${day.id}')">${dayLabel}</div>`
          }
          <div class="dbh-count" onclick="togDay('${day.id}')" style="cursor:pointer">${day.exercises.length} ej ${isOpen?'▲':'▼'}</div>
        </div>`;
      if (isOpen) {
        h += '<div class="r-ex-list">';
        day.exercises.forEach(ex => {
          h += `<div class="r-ex-row">
            <div class="r-ex-info">
              <div class="r-ex-name">${ex.name}${ex.ss?` <span style="font-size:10px;color:var(--blue)">[SS]</span>`:''}</div>
              <div class="r-ex-detail">${ex.sets}s · ${ex.reps} · ${ex.sw > 0 ? ex.sw+'kg' : 'pc'}</div>
            </div>
            ${editZoneOpen ? `<div class="r-ex-acts">
              <button class="ib" onclick="editExModal('${day.id}','${ex.id}')">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="ib del" onclick="delEx('${day.id}','${ex.id}')">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              </button>
            </div>` : ''}
          </div>`;
        });
        if (editZoneOpen) {
          h += `<div style="padding:10px 14px;border-top:1px solid var(--line)">
            <button style="font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:0" onclick="showAddExModal('${day.id}')">+ agregar ejercicio a ${day.name}</button>
          </div>`;
        }
        h += '</div>';
      }
      h += '</div>';
    });

    // Zona de edición colapsada al fondo
    h += `<button class="edit-zone-toggle" onclick="editZoneOpen=!editZoneOpen;renderRout()">
      ${editZoneOpen ? '▲ ocultar edición' : '▼ editar ejercicios'}
    </button>`;
  }

  // Rutinas anteriores (las no activas)
  const oldRouts = db.routines.filter(r => !r.active);
  if (oldRouts.length) {
    h += `<div style="padding:16px 14px 4px"><div class="sec-label" style="padding:0 0 10px">Rutinas anteriores</div>`;
    oldRouts.forEach(r => {
      const totalEx = r.days.reduce((a,d)=>a+d.exercises.length,0);
      const sessCount = db.sessions.filter(s => r.days.some(d=>d.id===s.dayId)).length;
      h += `<div style="background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:14px;font-weight:500;color:var(--t1)">${r.name}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:3px;font-family:var(--mono)">${r.days.length} dias · ${totalEx} ejercicios · ${sessCount} sesiones</div>
          ${r.startDate ? `<div style="font-size:10px;color:var(--t3);margin-top:2px">desde ${fdate(r.startDate)}</div>` : ''}
        </div>
        <button onclick="setActiveRoutine('${r.id}')" style="font-size:11px;color:var(--blue);background:none;border:1px solid rgba(77,142,240,.3);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:var(--sans)">reactivar</button>
      </div>`;
    });
    h += `</div>`;
  }

  h += '</div>';
  document.getElementById('s-rout').innerHTML = h;
}

function setActiveRoutine(routId) {
  db.routines.forEach(r => r.active = r.id===routId);
  sdb(); renderRout();
}

// saveDayName: el input del día acepta "Lunes · Pierna" o "Lunes - Pierna"
// Lo partimos en name y muscle para mantener la estructura de datos limpia.
function saveDayName(dayId, val) {
  const rout = db.routines.find(r => r.active);
  const day = rout?.days.find(d => d.id===dayId);
  if (!day) return;
  // Soporta separadores · o -
  const parts = val.split(/[·\-]/).map(s => s.trim()).filter(Boolean);
  day.name   = parts[0] || val.trim();
  day.muscle = parts[1] || '';
  sdb();
  // No re-renderizamos para no cortar el flujo de edición
}

function togDay(id) { openDays[id] = openDays[id]===false; renderRout(); }

// Modal para crear rutina nueva completa (cada 3 meses)
function showNewRoutineModal() {
  document.getElementById('mc').innerHTML = `
    <div class="m-title">Nueva rutina</div>
    <div class="fg"><label class="fl">Título (ej: "Marzo 2025")</label><input class="fi" id="f-rname" placeholder="Nombre de la rutina"></div>
    <div class="fg"><label class="fl">Fecha de inicio</label><input class="fi" id="f-rdate" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
    <div class="fg"><label class="fl">Cantidad de días</label>
      <select class="fi" id="f-rdays">

    <p style="font-size:12px;color:var(--t3);margin-bottom:4px;line-height:1.6">Esto crea la estructura vacía. Después cargás los ejercicios día por día desde la vista de edición.</p>

function saveNewRoutine() {
  const name = document.getElementById('f-rname').value.trim();
  if (!name) return;
  const nDays = parseInt(document.getElementById('f-rdays').value) || 5;
  const startDate = document.getElementById('f-rdate').value;
  const dayNames = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const days = Array.from({length: nDays}, (_, i) => ({
    id: 'd'+Date.now()+i, name: dayNames[i], muscle: '', exercises: []
  }));
  // Desactivar rutina anterior
  db.routines.forEach(r => r.active = false);
  db.routines.push({ id:'r'+Date.now(), name, startDate, active:true, days });
  editZoneOpen = true; // abrir edición automáticamente para que cargue los ejercicios
  sdb(); syncRoutines(); closeModal(); renderRout();
}

function toggleSSField(show) {

  const yes = document.getElementById('ss-toggle-yes');

  const rout = db.routines.find(r => r.active);

function saveNewEx() {
  const rout = db.routines.find(r => r.active);

  const day = rout?.days.find(d => d.id===dayId); if (!day) return;

function editExModal(dayId, exId) {
  const rout = db.routines.find(r => r.active);
  const ex = rout?.days.find(d=>d.id===dayId)?.exercises.find(e=>e.id===exId);
  if (!ex) return;

function saveEditEx(dId, eId) {
  const rout = db.routines.find(r => r.active);
  const ex = rout?.days.find(d=>d.id===dId)?.exercises.find(e=>e.id===eId);
  if (!ex) return;
  ex.name = document.getElementById('f-name').value.trim() || ex.name;
  ex.desc = document.getElementById('f-desc').value.trim();
  ex.sets = parseInt(document.getElementById('f-sets').value)||ex.sets;
  ex.reps = document.getElementById('f-reps').value||ex.reps;
  ex.sw   = parseFloat(document.getElementById('f-sw').value)||0;
  sdb(); syncRoutines(); closeModal(); renderRout();
}

function delEx(dId, eId) {
  const rout = db.routines.find(r => r.active);
  const day = rout?.days.find(d => d.id===dId); if (!day) return;
  if (!confirm('¿Eliminar este ejercicio?')) return;
  day.exercises = day.exercises.filter(e => e.id!==eId);
  sdb(); renderRout();
}

// confirmExit: abandona la sesión guardando lo que se hizo hasta ahora
function confirmExit() {
  if (!confirm('Salir y borrar esta sesion?')) return;
  db.cur = null;
  sessStart = null;
  trainState.dayId = null;
  clearInterval(elapsedIv);
  skipTimer();
  sdb();
  renderTrain();
}

// skipExercise: salta el ejercicio actual sin registrar nada
function skipExercise() {
  const curBlk = trainState.exerciseQueue[trainState.currentExIdx];
  if (!curBlk) return;
  // Marca como saltado (no como done) y avanza
  trainState.currentExIdx++;
  trainState.currentSerieIdx = 0;
  sdb();
  renderTrain();
}

/* exportData: serializa db a JSON y lo descarga como archivo.
   En iOS Safari esto abre el JSON en el navegador y el usuario
   lo puede compartir/guardar desde ahí. No hay API de descarga
   directa en WKWebView, pero funciona bien desde Safari normal. */
function exportData() {
  const json     = JSON.stringify(db, null, 2);
  const blob     = new Blob([json], { type: 'application/json' });
  const url      = URL.createObjectURL(blob);
  const date     = new Date().toISOString().split('T')[0];
  const filename = `bullgen-backup-${date}.json`;
  const a        = document.createElement('a');
  a.href         = url;
  a.download     = filename;
  a.click();
  URL.revokeObjectURL(url);
}

/* importData: lee el archivo JSON seleccionado, valida que tenga
   la estructura esperada, y reemplaza db.
   IMPORTANTE: hacemos una validación mínima antes de sobreescribir
   para no romper la app con un archivo corrupto o equivocado. */
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      // Validación mínima de estructura
      if (!parsed.routines || !Array.isArray(parsed.routines)) {
        alert('El archivo no parece ser un backup válido de BullGen.');
        return;
      }
      if (!confirm(`Importar backup del ${file.name}? Esto reemplazará todos los datos actuales.`)) return;
      db = parsed;
      // Aseguramos que tenga sessions y cur aunque el backup sea viejo
      if (!db.sessions) db.sessions = [];
      if (!('cur' in db)) db.cur = null;
      sdb();
      // Resetear estado de UI
      trainState.dayId = null;
      editZoneOpen = false;
      renderRout();
      alert('Backup importado correctamente.');
    } catch(err) {
      alert('Error al leer el archivo: ' + err.message);
    }
  };
  reader.readAsText(file);
  // Limpiar el input para que se pueda volver a importar el mismo archivo
  input.value = '';
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

// exportJSON: serializa db completo y lo descarga como archivo.
// El truco es crear un <a> temporal con un blob URL y hacer click programático.
// En iOS Safari esto abre el archivo en lugar de descargarlo — el usuario
// puede guardarlo desde ahí a Archivos o Google Drive manualmente.
function exportJSON() {
  const data = JSON.stringify(db, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().split('T')[0];
  a.href     = url;
  a.download = `bullgen_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// importJSON: lee el archivo seleccionado, parsea el JSON y reemplaza db.
// IMPORTANTE: validamos que tenga la estructura mínima antes de sobrescribir.
// FileReader es la API del browser para leer archivos locales sin servidor.
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.routines || !parsed.sessions) {
        alert('El archivo no parece ser un backup válido de BullGen.');
        return;
      }
      if (!confirm(`¿Importar backup? Esto reemplaza todos los datos actuales.\n\nRutinas: ${parsed.routines.length}\nSesiones: ${parsed.sessions.length}`)) return;
      db = parsed;
      sdb();
      alert('Backup importado correctamente.');
      renderTrain();
    } catch(err) {
      alert('Error al leer el archivo: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function isToday(d) { const a=new Date(d),b=new Date(); return a.toDateString()===b.toDateString(); }

// calcStreak: cuenta dias consecutivos con al menos una sesion.
// Parte desde hoy hacia atras. Si ayer no hay sesion, la racha se corta.
function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const daySet = new Set(sessions.map(s => new Date(s.date).toDateString()));
  let streak = 0;
  const d = new Date();
  // Si hoy no hay sesion aun, empezamos desde ayer
  if (!daySet.has(d.toDateString())) d.setDate(d.getDate()-1);
  while (daySet.has(d.toDateString())) {
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// buildHeatmap: genera 126 celdas (18 semanas) mostrando intensidad por dia.
// La intensidad se basa en cuantas sesiones hubo ese dia (0-4+ = lvl 0-4).
function buildHeatmap(nDays=60) {
  const grid = document.getElementById('heatmap-grid');
  if (!grid) return;
  const daySet = {};
  db.sessions.forEach(s => {
    const k = new Date(s.date).toDateString();
    daySet[k] = (daySet[k]||0) + 1;
  });
  const today = new Date();
  const cells = [];
  for (let i = nDays-1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate()-i);
    const k = d.toDateString();
    const count = daySet[k] || 0;
    const lvl = count === 0 ? 0 : count === 1 ? 2 : count === 2 ? 3 : 4;
    const isT = i === 0;
    cells.push(`<div class="hm-cell ${lvl>0?'lvl'+lvl:''} ${isT?'today':''}" title="${d.toLocaleDateString('es-AR',{day:'numeric',month:'short'})}${count?' — '+count+' sesion':''}"></div>`);
  }
  grid.innerHTML = cells.join('');
}
function fdate(d)   { return new Date(d).toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'2-digit'}); }
function fdateS(d)  { return new Date(d).toLocaleDateString('es-AR',{day:'numeric',month:'numeric'}); }

// Init — primero sincroniza con el servidor, después renderiza
// Si no hay API configurada o no hay internet, renderTrain() se llama igual
syncFromServer().then(() => renderTrain());
